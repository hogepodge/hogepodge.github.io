<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Basic Page Needs–––––––––––––––––––––––––– -->
  <meta charset="utf-8">
  <title>{% block title %}hogepodge{% endblock %}</title>
  <meta name="description" content="{% block description %}The personal page for Chris Hoge{% endblock %}">
  <meta name="author" content="{{ config.extra.author }}">

  <!-- Mobile Specific Metas ––––––––––––––––––––––– -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- FONT ––––––––––––––––––––––––– -->
  <link href="//fonts.googleapis.com/css?family=Raleway:400,300,600" rel="stylesheet" type="text/css">

  <!-- CSS ––––––––––––––––––––––– -->
  <link rel="stylesheet" href="/css/normalize.css">
  <link rel="stylesheet" href="/css/skeleton.css">
  <link rel="stylesheet" href="/css/hogepodge.css">

  <!-- Favicon ––––––––––––––––––––––––––––––––––––––– -->
  <link rel="icon" type="image/png" href="/images/favicon.png">

  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ config.extra.google_analytics_id }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', '{{ config.extra.google_analytics_id }}');
  </script>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
